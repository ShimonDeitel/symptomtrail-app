name: Symptomtrail
options:
  bundleIdPrefix: com.shimondeitel.symptomdiary
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Symptomtrail:
    type: application
    platform: iOS
    sources:
      - path: Symptomtrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.symptomdiary
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Symptomtrail/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SymptomtrailTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SymptomtrailTests
      - path: Symptomtrail.storekit
    dependencies:
      - target: Symptomtrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.symptomdiary.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SymptomtrailUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SymptomtrailUITests
    dependencies:
      - target: Symptomtrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.symptomdiary.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Symptomtrail:
    build:
      targets:
        Symptomtrail: all
        SymptomtrailTests: [test]
        SymptomtrailUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Symptomtrail.storekit
    test:
      config: Debug
      storeKitConfiguration: Symptomtrail.storekit
      targets:
        - SymptomtrailTests
        - SymptomtrailUITests
    archive:
      config: Release
